name: Discord Notification

on:
  pull_request:
    types:
      - opened
      - closed

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MESSAGE: |
            🎮 Morgames PR update
            ${{ github.event.pull_request.title }}
